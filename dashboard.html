{% extends "base.html" %}

{% block content %}
<h2>Producer Dashboard</h2>

<table>
    <tr>
        <th>Product</th>
        <th>Price (£)</th>
        <th>Stock</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.price }}</td>
        <td>{{ product.stock }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
